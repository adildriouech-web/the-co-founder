<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>The Co-Founder — Analytics</title>
<style>
  :root{ --bg:#0c0f0e; --panel:#131816; --line:#1e2622; --ink:#e8efe9; --mut:#8aa294; --acc:#39d98a; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap{ max-width:960px; margin:0 auto; padding:28px 18px 60px; }
  h1{ font-size:20px; margin:0 0 2px; } .sub{ color:var(--mut); font-size:13px; margin-bottom:22px; }
  .gate{ display:flex; gap:8px; margin:18px 0; }
  input{ flex:1; background:var(--panel); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:11px 13px; font-size:15px; }
  button{ background:var(--acc); color:#04130c; border:0; border-radius:10px; padding:11px 16px; font-weight:600; cursor:pointer; }
  button.ghost{ background:transparent; color:var(--mut); border:1px solid var(--line); }
  .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin:16px 0 24px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; }
  .card .n{ font-size:28px; font-weight:700; } .card .l{ color:var(--mut); font-size:12px; margin-top:4px; }
  .card .s{ color:var(--acc); font-size:12px; margin-top:6px; }
  h2{ font-size:14px; color:var(--mut); text-transform:uppercase; letter-spacing:.04em; margin:24px 0 10px; }
  .bars{ display:flex; align-items:flex-end; gap:6px; height:140px; padding:10px; background:var(--panel); border:1px solid var(--line); border-radius:14px; }
  .bar{ flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:6px; height:100%; }
  .bar .fill{ width:70%; background:var(--acc); border-radius:4px 4px 0 0; min-height:2px; }
  .bar .d{ color:var(--mut); font-size:9px; transform:rotate(-45deg); white-space:nowrap; }
  .muted{ color:var(--mut); } .err{ color:#ff8a8a; margin-top:10px; }
  .foot{ color:var(--mut); font-size:12px; margin-top:26px; }
  .row{ display:flex; gap:18px; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="wrap">
  <h1>The Co-Founder — Analytics</h1>
  <div class="sub">First-party usage metrics. Nothing here is shared with third parties.</div>

  <div id="gate" class="gate">
    <input id="tok" type="password" placeholder="Stats token" autocomplete="off">
    <button onclick="load()">View</button>
  </div>
  <div id="err" class="err"></div>

  <div id="dash" style="display:none">
    <div class="cards" id="cards"></div>
    <h2>Daily activity (last 14 days)</h2>
    <div class="bars" id="bars"></div>
    <div class="row" style="margin-top:18px">
      <div><h2>Feedback</h2><div id="fb" class="muted"></div></div>
      <div><h2>Backend</h2><div id="be" class="muted"></div></div>
    </div>
    <div class="foot">
      Last activity: <span id="last">—</span> ·
      <button class="ghost" onclick="load()">Refresh</button>
      <button class="ghost" onclick="signout()">Sign out</button>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
function tok(){ return sessionStorage.getItem("cf_stats_tok")||""; }
function num(n){ return (n==null?0:n).toLocaleString(); }

async function load(){
  const t = ($("tok").value || tok()).trim();
  if(!t){ $("err").textContent="Enter the stats token."; return; }
  $("err").textContent="Loading…";
  try{
    const r = await fetch("/api/stats", { headers:{ "x-stats-token": t } });
    if(r.status===401){ $("err").textContent="Wrong token."; return; }
    if(r.status===503){ $("err").textContent="Stats are disabled on the server (STATS_TOKEN not set)."; return; }
    if(!r.ok){ $("err").textContent="Error "+r.status; return; }
    const s = await r.json();
    sessionStorage.setItem("cf_stats_tok", t);
    render(s); $("err").textContent="";
  }catch(e){ $("err").textContent="Network error: "+e.message; }
}

function render(s){
  $("gate").style.display="none"; $("dash").style.display="block";
  const T=s.totals||{}, W=s.last7Days||{};
  const cards=[
    { n:num(T.founders), l:"Founders (unique)", s:"+"+num(W.founders)+" in 7d" },
    { n:num(T.returningFounders), l:"Returning founders", s:(Math.round((T.returnRate||0)*100))+"% return rate" },
    { n:num(T.conversations), l:"Conversations", s:"+"+num(W.conversations)+" in 7d" },
    { n:num(T.turns), l:"Messages answered", s:"+"+num(W.turns)+" in 7d" },
  ];
  $("cards").innerHTML = cards.map(c=>`<div class="card"><div class="n">${c.n}</div><div class="l">${c.l}</div><div class="s">${c.s}</div></div>`).join("");
  const daily=s.daily||[]; const max=Math.max(1,...daily.map(d=>d.turns));
  $("bars").innerHTML = daily.length ? daily.map(d=>{
    const h=Math.round((d.turns/max)*100);
    return `<div class="bar" title="${d.day}: ${d.turns} messages, ${d.conversations} conversations, ${d.founders} founders"><div class="fill" style="height:${h}%"></div><div class="d">${d.day.slice(5)}</div></div>`;
  }).join("") : '<div class="muted" style="margin:auto">No activity yet.</div>';
  const fb=s.feedback||{up:0,down:0};
  $("fb").textContent = `👍 ${num(fb.up)}   👎 ${num(fb.down)}`;
  $("be").textContent = s.backend==="neon" ? "Neon Postgres (durable)" : "local jsonl (ephemeral)";
  $("last").textContent = T.lastActive ? new Date(T.lastActive).toLocaleString() : "—";
}

function signout(){ sessionStorage.removeItem("cf_stats_tok"); location.reload(); }
if(tok()){ $("tok").value=tok(); load(); }
</script>
</body>
</html>
